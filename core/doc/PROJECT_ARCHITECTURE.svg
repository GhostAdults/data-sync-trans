<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Relus project architecture</title>
  <desc id="desc">Architecture diagram for the Relus Rust workspace, showing CLI, core scheduler and pipeline, reader and writer plugins, common types, RDBMS connector, configuration, and external systems.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <marker id="data-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 15px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .section-label { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #334155; letter-spacing: .4px; }
      .box-title { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #111827; }
      .box-text { font: 14px "Segoe UI", Arial, sans-serif; fill: #334155; }
      .small { font: 12px "Segoe UI", Arial, sans-serif; fill: #475569; }
      .mono { font: 13px Consolas, "Courier New", monospace; fill: #1f2937; }
      .layer { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .entry { fill: #eff6ff; stroke: #60a5fa; stroke-width: 1.5; rx: 8; }
      .core { fill: #fff7ed; stroke: #fb923c; stroke-width: 1.5; rx: 8; }
      .plugin { fill: #f0fdf4; stroke: #4ade80; stroke-width: 1.5; rx: 8; }
      .shared { fill: #f5f3ff; stroke: #a78bfa; stroke-width: 1.5; rx: 8; }
      .external { fill: #fef2f2; stroke: #f87171; stroke-width: 1.5; rx: 8; }
      .connector { fill: #ecfeff; stroke: #22d3ee; stroke-width: 1.5; rx: 8; }
      .line { fill: none; stroke: #374151; stroke-width: 2; marker-end: url(#arrow); }
      .data-line { fill: none; stroke: #0f766e; stroke-width: 3; marker-end: url(#data-arrow); }
      .soft-line { fill: none; stroke: #94a3b8; stroke-width: 1.6; marker-end: url(#arrow); stroke-dasharray: 6 5; }
      .note { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1; rx: 8; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="900"/>
  <text class="title" x="56" y="54">Relus 当前项目架构图</text>
  <text class="subtitle" x="56" y="80">Rust workspace: CLI 入口、核心调度与流水线、Reader/Writer 插件、RDBMS 连接器、共享配置与类型</text>

  <rect class="layer" x="40" y="110" width="1200" height="100"/>
  <text class="section-label" x="64" y="136">ENTRY / CONFIG</text>
  <rect class="entry" x="80" y="152" width="250" height="42"/>
  <text class="box-title" x="102" y="179">relus_cli</text>
  <text class="mono" x="205" y="179">cli/src/main.rs</text>
  <rect class="entry" x="410" y="152" width="300" height="42"/>
  <text class="box-title" x="432" y="179">job config</text>
  <text class="mono" x="535" y="179">cli/user_config/*.json</text>
  <rect class="entry" x="790" y="152" width="360" height="42"/>
  <text class="box-title" x="812" y="179">system config + watcher</text>
  <text class="mono" x="1015" y="179">common::app_config</text>

  <rect class="layer" x="40" y="245" width="1200" height="245"/>
  <text class="section-label" x="64" y="272">CORE ENGINE</text>
  <rect class="core" x="80" y="300" width="250" height="70"/>
  <text class="box-title" x="102" y="326">relus_core facade</text>
  <text class="box-text" x="102" y="350">init config, read job, run serve</text>
  <text class="mono" x="102" y="365">core/src/lib.rs</text>

  <rect class="core" x="390" y="300" width="240" height="70"/>
  <text class="box-title" x="412" y="326">runner / container</text>
  <text class="box-text" x="412" y="350">prepare jobs and components</text>
  <text class="mono" x="412" y="365">core::runner</text>

  <rect class="core" x="690" y="300" width="240" height="70"/>
  <text class="box-title" x="712" y="326">TaskScheduler</text>
  <text class="box-text" x="712" y="350">schedule, REPL, checkpoint</text>
  <text class="mono" x="712" y="365">core::scheduler</text>

  <rect class="core" x="990" y="300" width="200" height="70"/>
  <text class="box-title" x="1012" y="326">HTTP API</text>
  <text class="box-text" x="1012" y="350">control endpoint</text>
  <text class="mono" x="1012" y="365">serve / axum_api</text>

  <rect class="core" x="238" y="410" width="330" height="54"/>
  <text class="box-title" x="260" y="433">DSL engine</text>
  <text class="box-text" x="260" y="454">parser, AST, evaluator, function registry</text>

  <rect class="core" x="650" y="410" width="330" height="54"/>
  <text class="box-title" x="672" y="433">pipeline</text>
  <text class="box-text" x="672" y="454">Record / RecordBuilder / async flow</text>

  <rect class="layer" x="40" y="525" width="1200" height="185"/>
  <text class="section-label" x="64" y="552">PLUGIN LAYER</text>
  <rect class="plugin" x="80" y="580" width="305" height="92"/>
  <text class="box-title" x="102" y="606">relus_reader</text>
  <text class="box-text" x="102" y="630">DataReaderJob + DataReaderTask</text>
  <text class="box-text" x="102" y="651">api, database, mysql_binlog</text>
  <text class="mono" x="102" y="666">inventory::ReaderPlugin</text>

  <rect class="plugin" x="490" y="580" width="305" height="92"/>
  <text class="box-title" x="512" y="606">relus_writer</text>
  <text class="box-text" x="512" y="630">DataWriterJob + DataWriterTask</text>
  <text class="box-text" x="512" y="651">database writer, batch writing</text>
  <text class="mono" x="512" y="666">inventory::WriterPlugin</text>

  <rect class="shared" x="900" y="580" width="250" height="92"/>
  <text class="box-title" x="922" y="606">relus_common</text>
  <text class="box-text" x="922" y="630">JobConfig, PipelineMessage</text>
  <text class="box-text" x="922" y="651">types, logging, app config</text>
  <text class="mono" x="922" y="666">common/src/lib.rs</text>

  <rect class="layer" x="40" y="745" width="1200" height="110"/>
  <text class="section-label" x="64" y="772">CONNECTORS / EXTERNAL SYSTEMS</text>
  <rect class="external" x="80" y="795" width="225" height="42"/>
  <text class="box-title" x="102" y="822">source systems</text>
  <text class="small" x="225" y="822">API / DB / binlog</text>

  <rect class="connector" x="385" y="790" width="320" height="52"/>
  <text class="box-title" x="407" y="813">relus_connector_rdbms</text>
  <text class="box-text" x="407" y="834">pool, metadata, schema discovery, SQL builder</text>

  <rect class="external" x="790" y="795" width="225" height="42"/>
  <text class="box-title" x="812" y="822">target systems</text>
  <text class="small" x="935" y="822">RDBMS destinations</text>

  <rect class="note" x="1048" y="782" width="142" height="66"/>
  <text class="small" x="1062" y="806">Data flow:</text>
  <text class="small" x="1062" y="825">Reader -> pipeline</text>
  <text class="small" x="1062" y="844">-> Writer</text>

  <path class="line" d="M330 173 H410"/>
  <path class="line" d="M710 173 H790"/>
  <path class="line" d="M205 194 V300"/>
  <path class="line" d="M560 194 C560 240 205 240 205 300"/>
  <path class="line" d="M970 194 C970 240 205 240 205 300"/>

  <path class="line" d="M330 335 H390"/>
  <path class="line" d="M630 335 H690"/>
  <path class="line" d="M930 335 H990"/>
  <path class="soft-line" d="M510 370 C510 390 410 390 410 410"/>
  <path class="soft-line" d="M810 370 C810 390 810 390 810 410"/>

  <path class="line" d="M510 370 C510 500 232 500 232 580"/>
  <path class="line" d="M810 370 C810 500 642 500 642 580"/>
  <path class="soft-line" d="M1025 580 C1025 520 810 520 810 370"/>

  <path class="data-line" d="M305 816 H385"/>
  <path class="data-line" d="M232 580 V520 C232 500 405 500 405 464"/>
  <path class="data-line" d="M568 437 H650"/>
  <path class="data-line" d="M815 464 C815 520 642 520 642 580"/>
  <path class="data-line" d="M795 626 C835 680 545 715 545 790"/>
  <path class="data-line" d="M705 816 H790"/>

  <path class="soft-line" d="M232 672 C232 725 545 725 545 790"/>
  <path class="soft-line" d="M642 672 C642 725 545 725 545 790"/>
  <path class="soft-line" d="M1025 672 C1025 730 545 730 545 790"/>

  <text class="small" x="333" y="803">read/query/schema</text>
  <text class="small" x="713" y="803">write/batch SQL</text>
  <text class="small" x="504" y="513">job orchestration</text>
  <text class="small" x="716" y="505">records/messages</text>
</svg>
